<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Volunteer Check-In · The Offline Vibes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet"/>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{font-size:16px;scroll-behavior:smooth;}
body{background:#0A0806;color:#fff;font-family:'Instrument Sans',sans-serif;min-height:100vh;overflow-x:hidden;line-height:1.6;}
:root{
  --sun:#FF7043;--sun-glow:rgba(255,112,67,.22);--sun-dim:rgba(255,112,67,.12);
  --grass:#43A047;--grass-dim:rgba(67,160,71,.12);--grass-border:rgba(67,160,71,.28);
  --amber:#FFB300;--amber-dim:rgba(255,179,0,.1);--amber-border:rgba(255,179,0,.28);
  --rose:#EF4444;--rose-dim:rgba(239,68,68,.1);--rose-border:rgba(239,68,68,.28);
  --sky:#29B6D4;--card:#161210;--card2:#1E1A17;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.04);
  --muted:rgba(255,255,255,.38);--muted2:rgba(255,255,255,.18);
  --r:14px;--r-lg:20px;--r-xl:26px;
}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:var(--sun);border-radius:4px;}
.bg-grid{position:fixed;inset:0;pointer-events:none;z-index:0;background-image:radial-gradient(rgba(255,112,67,.05) 1px,transparent 1px);background-size:32px 32px;}
.bg-glow{position:fixed;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(255,112,67,.07) 0%,transparent 65%);top:-200px;left:50%;transform:translateX(-50%);pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;}

/* ── LOGIN ── */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.login-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r-xl);padding:48px 40px;max-width:400px;width:100%;text-align:center;box-shadow:0 24px 80px rgba(0,0,0,.5);animation:slideUp .4s cubic-bezier(.34,1.4,.64,1);}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.login-logo{font-family:'Bricolage Grotesque',sans-serif;font-size:15px;font-weight:800;color:var(--sun);margin-bottom:24px;display:flex;align-items:center;justify-content:center;gap:8px;}
.live-dot{width:8px;height:8px;border-radius:50%;background:var(--grass);animation:pulse 2.2s ease-in-out infinite;flex-shrink:0;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(67,160,71,.5);}60%{box-shadow:0 0 0 8px rgba(67,160,71,0);}}
.login-icon{font-size:52px;margin-bottom:16px;}
.login-h{font-family:'Bricolage Grotesque',sans-serif;font-size:26px;font-weight:800;color:#fff;margin-bottom:6px;letter-spacing:-.4px;}
.login-sub{font-size:13px;color:var(--muted);margin-bottom:28px;line-height:1.7;}
.pin-inputs{display:flex;gap:10px;justify-content:center;margin-bottom:20px;}
.pin-box{width:52px;height:60px;background:#1a1512;border:2px solid var(--border);border-radius:12px;font-family:'Bricolage Grotesque',sans-serif;font-size:24px;font-weight:800;color:#fff;text-align:center;outline:none;transition:all .2s;-webkit-appearance:none;}
.pin-box:focus{border-color:var(--sun);box-shadow:0 0 0 4px var(--sun-dim);background:#1f180e;}
.pin-box.filled{border-color:rgba(255,112,67,.4);}
.pin-box.error{border-color:var(--rose);background:rgba(239,68,68,.08);animation:shake .4s ease;}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
.login-btn{width:100%;padding:15px;background:var(--sun);color:#fff;border:none;border-radius:100px;font-family:'Instrument Sans',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;}
.login-btn:hover:not(:disabled){background:#F4511E;transform:translateY(-2px);box-shadow:0 8px 24px var(--sun-glow);}
.login-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}
.login-err{font-size:13px;color:#F87171;margin-top:12px;font-weight:600;display:none;}
.login-note{font-size:11px;color:var(--muted2);margin-top:18px;line-height:1.7;padding:12px;background:rgba(255,255,255,.03);border-radius:10px;border:1px solid var(--border);}

/* ── TOPBAR ── */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;border-bottom:1px solid var(--border);background:rgba(10,8,6,.92);backdrop-filter:blur(20px);position:sticky;top:0;z-index:100;gap:12px;flex-wrap:wrap;}
.topbar-brand{display:flex;align-items:center;gap:10px;font-family:'Bricolage Grotesque',sans-serif;font-size:16px;font-weight:800;color:#fff;letter-spacing:-.3px;}
.topbar-badge{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:4px 12px;border-radius:100px;background:rgba(255,112,67,.12);border:1px solid rgba(255,112,67,.25);color:var(--sun);}
.topbar-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.tbtn{background:var(--card2);border:1px solid var(--border);color:var(--muted);padding:7px 14px;border-radius:100px;font-family:'Instrument Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;}
.tbtn:hover{color:#fff;background:#252015;}
.tbtn.danger{color:#F87171;border-color:rgba(248,113,113,.2);}
.tbtn.danger:hover{background:rgba(248,113,113,.1);}

/* ── MAIN GRID ── */
.main{flex:1;display:grid;grid-template-columns:420px 1fr;min-height:calc(100vh - 57px);}

/* ── LEFT PANEL ── */
.left-panel{border-right:1px solid var(--border);padding:22px 20px;display:flex;flex-direction:column;gap:18px;background:rgba(10,8,6,.5);overflow-y:auto;}

/* ── STATS ── */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.stat-pill{background:var(--card2);border:1px solid var(--border);border-radius:var(--r);padding:14px 10px;text-align:center;}
.stat-n{font-family:'Bricolage Grotesque',sans-serif;font-size:28px;font-weight:800;line-height:1;margin-bottom:4px;}
.stat-n.sun{color:var(--sun);}.stat-n.grass{color:var(--grass);}.stat-n.sky{color:var(--sky);}
.stat-l{font-size:9px;color:var(--muted);font-weight:700;letter-spacing:1px;text-transform:uppercase;}

/* ── SCAN INPUT ── */
.scan-label{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;display:flex;align-items:center;gap:8px;}
.scan-label::before{content:'';width:14px;height:2px;background:var(--sun);border-radius:2px;}
.scan-input-wrap{position:relative;}
.scan-input{width:100%;padding:15px 50px 15px 16px;background:var(--card2);border:1.5px solid var(--border);border-radius:var(--r-lg);font-family:'Bricolage Grotesque',sans-serif;font-size:17px;font-weight:700;color:#fff;letter-spacing:2px;text-transform:uppercase;outline:none;transition:all .22s;-webkit-appearance:none;}
.scan-input:focus{border-color:var(--sun);background:#1a1208;box-shadow:0 0 0 4px var(--sun-dim);}
.scan-input::placeholder{color:var(--muted2);font-size:13px;letter-spacing:.5px;text-transform:none;font-weight:500;}
.scan-go-btn{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:var(--sun);border:none;color:#fff;width:34px;height:34px;border-radius:9px;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.scan-go-btn:hover{background:#F4511E;}
.scan-hint{font-size:11px;color:var(--muted2);margin-top:6px;}

/* ── CAMERA ── */
.camera-section{background:var(--card2);border:1.5px solid var(--border);border-radius:var(--r-lg);overflow:hidden;}
.camera-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border2);}
.camera-title{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase;}
.cam-toggle-btn{background:var(--sun);color:#fff;border:none;padding:6px 16px;border-radius:100px;font-family:'Instrument Sans',sans-serif;font-size:11px;font-weight:700;cursor:pointer;transition:all .2s;}
.cam-toggle-btn:hover{background:#F4511E;}
.cam-toggle-btn.active{background:rgba(239,68,68,.15);color:#F87171;border:1px solid rgba(239,68,68,.3);}
.cam-toggle-btn.active:hover{background:rgba(239,68,68,.25);}
.cam-idle{padding:28px;text-align:center;color:var(--muted);font-size:13px;display:flex;flex-direction:column;align-items:center;gap:8px;}
.cam-idle-icon{font-size:36px;}
#qr-reader{width:100%;}
#qr-reader video{width:100%!important;border-radius:0!important;}
#qr-reader img{display:none!important;}
#qr-reader__dashboard_section_csr button{background:var(--sun)!important;color:#fff!important;border:none!important;border-radius:8px!important;padding:8px 16px!important;font-family:'Instrument Sans',sans-serif!important;font-weight:600!important;cursor:pointer!important;}
#qr-reader__status_span{color:var(--muted)!important;font-size:12px!important;}

/* ── RESULT ── */
.result-card{border-radius:var(--r-xl);overflow:hidden;border:1.5px solid var(--border);animation:slideUp .3s cubic-bezier(.34,1.4,.64,1);}
.result-status-bar{padding:18px 20px;display:flex;align-items:center;gap:12px;}
.result-status-bar.ok{background:var(--grass-dim);border-bottom:1px solid var(--grass-border);}
.result-status-bar.warn{background:var(--amber-dim);border-bottom:1px solid var(--amber-border);}
.result-status-bar.err{background:var(--rose-dim);border-bottom:1px solid var(--rose-border);}
.result-status-bar.fresh{background:var(--sun-dim);border-bottom:1px solid rgba(255,112,67,.25);}
.result-icon{font-size:34px;line-height:1;flex-shrink:0;}
.result-title{font-family:'Bricolage Grotesque',sans-serif;font-size:18px;font-weight:800;color:#fff;letter-spacing:-.3px;}
.result-sub{font-size:11px;margin-top:2px;font-weight:600;}
.result-sub.ok{color:#66BB6A;}.result-sub.warn{color:#FFB300;}.result-sub.err{color:#F87171;}.result-sub.fresh{color:var(--sun);}
.result-body{background:var(--card);padding:16px 20px;}
.result-row{display:flex;justify-content:space-between;align-items:baseline;gap:10px;padding:8px 0;border-bottom:1px solid var(--border2);font-size:13px;}
.result-row:last-child{border-bottom:none;padding-bottom:0;}
.result-k{color:var(--muted);font-weight:600;flex-shrink:0;}
.result-v{font-weight:700;color:#fff;text-align:right;word-break:break-word;}
.result-v.sun{color:var(--sun);}.result-v.grass{color:#66BB6A;}
.tid-display{font-family:'Bricolage Grotesque',sans-serif;font-size:15px;color:var(--sun);letter-spacing:2px;}
.mark-btn{width:100%;padding:15px;background:var(--grass);color:#fff;border:none;border-radius:var(--r);font-family:'Instrument Sans',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .22s;margin-top:14px;display:flex;align-items:center;justify-content:center;gap:8px;}
.mark-btn:hover:not(:disabled){background:#388E3C;transform:translateY(-2px);box-shadow:0 8px 24px rgba(67,160,71,.3);}
.mark-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}
.done-btn{width:100%;padding:13px;background:transparent;color:var(--muted);border:1.5px solid var(--border);border-radius:var(--r);font-family:'Instrument Sans',sans-serif;font-size:12px;font-weight:600;cursor:default;margin-top:12px;display:flex;align-items:center;justify-content:center;gap:6px;}
.idle-state{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:28px;gap:10px;opacity:.4;}
.idle-icon{font-size:44px;}.idle-title{font-family:'Bricolage Grotesque',sans-serif;font-size:16px;font-weight:700;color:#fff;}.idle-sub{font-size:12px;color:var(--muted);}

/* ── RIGHT PANEL ── */
.right-panel{padding:24px;overflow-y:auto;background:#0D0A08;}
.list-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px;}
.list-title{font-family:'Bricolage Grotesque',sans-serif;font-size:20px;font-weight:800;color:#fff;letter-spacing:-.4px;}
.list-count{font-size:12px;color:var(--muted);font-weight:600;background:var(--card2);border:1px solid var(--border);padding:4px 12px;border-radius:100px;}
.filter-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center;}
.filter-inp{flex:1;min-width:160px;padding:9px 14px;background:var(--card2);border:1.5px solid var(--border);border-radius:100px;font-family:'Instrument Sans',sans-serif;font-size:13px;color:#fff;outline:none;transition:all .2s;}
.filter-inp:focus{border-color:var(--sun);box-shadow:0 0 0 3px var(--sun-dim);}
.filter-inp::placeholder{color:var(--muted2);}
.filter-pill{padding:7px 12px;border-radius:100px;font-size:11px;font-weight:700;letter-spacing:.5px;cursor:pointer;border:1.5px solid var(--border);background:var(--card2);color:var(--muted);transition:all .2s;white-space:nowrap;}
.filter-pill.active{background:var(--sun);border-color:var(--sun);color:#fff;}
.filter-pill:hover:not(.active){color:#fff;}
.att-table-wrap{overflow-x:auto;}
.att-table{width:100%;border-collapse:collapse;}
.att-table th{text-align:left;padding:9px 12px;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);border-bottom:1.5px solid var(--border);font-weight:700;white-space:nowrap;}
.att-table td{padding:12px 12px;font-size:13px;border-bottom:1px solid var(--border2);vertical-align:middle;color:#fff;}
.att-table tr:last-child td{border-bottom:none;}
.att-table tr:hover td{background:rgba(255,112,67,.03);}
.att-table tr.new-entry td{animation:rowFlash .8s ease;}
@keyframes rowFlash{0%,100%{background:transparent;}30%{background:rgba(67,160,71,.12);}}
.att-num{color:var(--muted);font-size:11px;font-weight:700;}
.att-name{font-weight:700;font-size:14px;}
.att-tid{font-family:monospace;color:var(--sun);font-size:11px;letter-spacing:.5px;background:var(--sun-dim);padding:2px 8px;border-radius:6px;display:inline-block;}
.att-gender{font-size:10px;font-weight:700;letter-spacing:.5px;padding:3px 8px;border-radius:100px;display:inline-block;}
.att-gender.female{background:rgba(233,30,140,.1);color:#E91E8C;border:1px solid rgba(233,30,140,.2);}
.att-gender.male{background:rgba(41,182,212,.1);color:var(--sky);border:1px solid rgba(41,182,212,.2);}
.att-gender.other{background:var(--card2);color:var(--muted);border:1px solid var(--border);}
.att-time{font-size:11px;color:var(--muted);white-space:nowrap;}
.att-status{font-size:10px;font-weight:700;letter-spacing:.5px;padding:3px 10px;border-radius:100px;display:inline-flex;align-items:center;gap:4px;}
.att-status.attended{background:var(--grass-dim);color:#66BB6A;border:1px solid var(--grass-border);}
.att-status.registered{background:rgba(255,179,0,.1);color:#FFB300;border:1px solid rgba(255,179,0,.25);}
.att-contact{display:inline-flex;align-items:center;gap:4px;background:rgba(67,160,71,.1);color:#66BB6A;border:1px solid rgba(67,160,71,.2);padding:4px 10px;border-radius:100px;font-size:11px;font-weight:700;text-decoration:none;transition:all .2s;}
.att-contact:hover{background:rgba(67,160,71,.18);}
.empty-list{text-align:center;padding:60px 30px;border:2px dashed var(--border);border-radius:var(--r-xl);color:var(--muted);}
.empty-list-icon{font-size:40px;margin-bottom:10px;}
.empty-list-title{font-family:'Bricolage Grotesque',sans-serif;font-size:16px;font-weight:700;color:rgba(255,255,255,.4);margin-bottom:4px;}
.loader{display:flex;align-items:center;justify-content:center;gap:8px;padding:40px;color:var(--muted);font-size:14px;}
.spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--sun);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.toast{position:fixed;bottom:20px;right:20px;background:var(--grass);color:#fff;padding:12px 20px;border-radius:12px;font-family:'Instrument Sans',sans-serif;font-size:14px;font-weight:700;box-shadow:0 8px 32px rgba(67,160,71,.35);display:flex;align-items:center;gap:8px;z-index:9999;animation:slideUp .3s cubic-bezier(.34,1.4,.64,1);}
.toast.warn{background:var(--amber);box-shadow:0 8px 32px rgba(255,179,0,.35);}
.toast.err{background:var(--rose);box-shadow:0 8px 32px rgba(239,68,68,.35);}

/* ── RESPONSIVE ── */
@media(max-width:900px){
  .main{grid-template-columns:1fr;grid-template-rows:auto 1fr;}
  .left-panel{border-right:none;border-bottom:1px solid var(--border);padding:16px;}
  .right-panel{padding:16px;}
}
@media(max-width:600px){
  .topbar{padding:10px 14px;}
  .att-table th:nth-child(6),.att-table td:nth-child(6),
  .att-table th:nth-child(8),.att-table td:nth-child(8){display:none;}
  .login-card{padding:36px 20px;}
  .pin-box{width:46px;height:54px;font-size:20px;}
}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-glow"></div>
<div id="root" class="app">
  <div class="loader" style="min-height:100vh;align-items:center;justify-content:center;">
    <div class="spinner"></div>&nbsp;Loading…
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════
//  🔥 YOUR FIREBASE CONFIG (already filled in)
// ══════════════════════════════════════════════════════════
const FB_CONFIG = {
  apiKey:            "AIzaSyB34f-TnV8ueA2XONEC6nXXhhPmIOKZ5mU",
  authDomain:        "theofflinevibes-ff9b6.firebaseapp.com",
  projectId:         "theofflinevibes-ff9b6",
  storageBucket:     "theofflinevibes-ff9b6.firebasestorage.app",
  messagingSenderId: "385394122406",
  appId:             "1:385394122406:web:8abf83d6a574fe77575e67",
};

// ══════════════════════════════════════════════════════════
//  🔐 VOLUNTEER PIN  ← Change this to your own secret PIN
//  Volunteers enter this PIN — completely separate from
//  Firebase / admin login. Session clears when tab closes.
// ══════════════════════════════════════════════════════════
const VOLUNTEER_PIN = "2580";   // ← change me!

// ── Init Firebase (no Auth) ───────────────────────────────
firebase.initializeApp(FB_CONFIG);
const DB = firebase.firestore();

// ── Utilities ─────────────────────────────────────────────
const nowStamp = () => {
  const d = new Date();
  return d.toLocaleDateString("en-IN",{day:"2-digit",month:"short",year:"numeric"})
       + " " + d.toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit"});
};
let _toast = null;
function showToast(msg, type="ok") {
  if (_toast) _toast.remove();
  _toast = document.createElement("div");
  _toast.className = "toast"+(type==="warn"?" warn":type==="err"?" err":"");
  _toast.innerHTML = (type==="ok"?"✅ ":type==="warn"?"⚠️ ":"❌ ")+msg;
  document.body.appendChild(_toast);
  setTimeout(()=>{ if(_toast){_toast.style.opacity="0";_toast.style.transition="opacity .4s";}setTimeout(()=>_toast?.remove(),400); },2800);
}

// ── Session (PIN-based, clears on tab close) ──────────────
function isAuthed()  { return sessionStorage.getItem("tov_vol")===VOLUNTEER_PIN; }
function saveAuth()  { sessionStorage.setItem("tov_vol", VOLUNTEER_PIN); }
function clearAuth() { sessionStorage.removeItem("tov_vol"); }

// ── App State ─────────────────────────────────────────────
let STATE = {
  registrations: [],
  loading: true,
  scanning: false,
  result: null,
  filter: "all",
  search: "",
  lastMarked: null,
  cameraOn: false,
};

const root = document.getElementById("root");

// ══════════════════════════════════════════════════════════
//  LOGIN — 4-digit PIN with individual boxes
// ══════════════════════════════════════════════════════════
function renderLogin(shake=false) {
  root.innerHTML = `
    <div class="bg-grid"></div><div class="bg-glow"></div>
    <div class="login-wrap">
      <div class="login-card">
        <div class="login-logo"><div class="live-dot"></div>The Offline Vibes</div>
        <div class="login-icon">🔒</div>
        <h2 class="login-h">Volunteer Access</h2>
        <p class="login-sub">Enter your 4-digit volunteer PIN to access the check-in dashboard.</p>
        <div class="pin-inputs" id="pin-wrap">
          <input class="pin-box${shake?" error":""}" id="p0" type="password" inputmode="numeric" maxlength="1" pattern="[0-9]"/>
          <input class="pin-box${shake?" error":""}" id="p1" type="password" inputmode="numeric" maxlength="1" pattern="[0-9]"/>
          <input class="pin-box${shake?" error":""}" id="p2" type="password" inputmode="numeric" maxlength="1" pattern="[0-9]"/>
          <input class="pin-box${shake?" error":""}" id="p3" type="password" inputmode="numeric" maxlength="1" pattern="[0-9]"/>
        </div>
        <div id="l-err" class="login-err"${shake?"":" style='display:none'"}>Wrong PIN. Try again.</div>
        <button class="login-btn" id="l-btn" onclick="checkPin()">Unlock Dashboard →</button>
        <div class="login-note">🔐 Ask your event organiser for the volunteer PIN.<br/>Session ends when you close this tab.</div>
      </div>
    </div>`;

  // Wire up PIN boxes — auto-advance and auto-submit
  const boxes = [0,1,2,3].map(i=>document.getElementById("p"+i));
  boxes.forEach((box,i)=>{
    box.addEventListener("input",()=>{
      box.classList.toggle("filled", box.value!=="");
      if (box.value && i<3) boxes[i+1].focus();
      if (boxes.every(b=>b.value)) checkPin();
    });
    box.addEventListener("keydown",e=>{
      if (e.key==="Backspace"&&!box.value&&i>0) { boxes[i-1].focus(); boxes[i-1].value=""; }
      if (e.key==="Enter") checkPin();
    });
    box.addEventListener("paste",e=>{
      e.preventDefault();
      const text=(e.clipboardData||window.clipboardData).getData("text").replace(/\D/g,"").slice(0,4);
      text.split("").forEach((ch,j)=>{ if(boxes[j]){ boxes[j].value=ch; boxes[j].classList.add("filled"); } });
      if(text.length===4) checkPin();
    });
  });
  setTimeout(()=>boxes[0]?.focus(),100);
}

function checkPin() {
  const boxes=[0,1,2,3].map(i=>document.getElementById("p"+i));
  const pin=boxes.map(b=>b?.value||"").join("");
  if (pin.length<4) return;
  if (pin===VOLUNTEER_PIN) {
    saveAuth();
    loadAndRender();
  } else {
    renderLogin(true);
    setTimeout(()=>document.getElementById("p0")?.focus(),50);
  }
}

// ══════════════════════════════════════════════════════════
//  DATA
// ══════════════════════════════════════════════════════════
async function loadAndRender() {
  root.innerHTML=`<div class="loader" style="min-height:100vh;align-items:center;justify-content:center;"><div class="spinner"></div>&nbsp;Loading registrations…</div>`;
  try {
    const snap=await DB.collection("registrations").orderBy("createdAt","desc").get();
    STATE.registrations=snap.docs.map(d=>({id:d.id,...d.data()}));
  } catch(e){ console.error(e); }
  STATE.loading=false;
  renderApp();
}

let _unsub=null;
function startLive() {
  if(_unsub)_unsub();
  _unsub=DB.collection("registrations").orderBy("createdAt","desc")
    .onSnapshot(snap=>{
      STATE.registrations=snap.docs.map(d=>({id:d.id,...d.data()}));
      renderList(); renderStats();
    },e=>console.error(e));
}

// ══════════════════════════════════════════════════════════
//  QR CAMERA
// ══════════════════════════════════════════════════════════
let qrScanner=null;

function startCamera() {
  STATE.cameraOn=true;
  updateCamBtn();
  const idle=document.getElementById("cam-idle");
  if(idle) idle.style.display="none";
  qrScanner=new Html5Qrcode("qr-reader");
  qrScanner.start(
    {facingMode:"environment"},
    {fps:10, qrbox:{width:220,height:220}},
    (text)=>{ stopCamera(); const inp=document.getElementById("scan-inp"); if(inp)inp.value=text; doScan(text); },
    ()=>{}
  ).catch(()=>{ showToast("Camera denied. Use manual entry.","err"); STATE.cameraOn=false; updateCamBtn(); const idle=document.getElementById("cam-idle"); if(idle)idle.style.display="flex"; });
}

function stopCamera() {
  if(qrScanner){ qrScanner.stop().catch(()=>{}); qrScanner=null; }
  STATE.cameraOn=false;
  updateCamBtn();
  const idle=document.getElementById("cam-idle");
  if(idle)idle.style.display="flex";
  const qrEl=document.getElementById("qr-reader");
  if(qrEl)qrEl.innerHTML="";
}

function toggleCamera() { STATE.cameraOn?stopCamera():startCamera(); }

function updateCamBtn() {
  const btn=document.getElementById("cam-btn");
  if(!btn)return;
  if(STATE.cameraOn){ btn.textContent="⏹ Stop Camera"; btn.className="cam-toggle-btn active"; }
  else{ btn.textContent="📷 Open Camera"; btn.className="cam-toggle-btn"; }
}

// ══════════════════════════════════════════════════════════
//  SCAN LOGIC — always hits Firestore for freshest data
// ══════════════════════════════════════════════════════════
async function doScan(rawInput) {
  if(STATE.scanning)return;
  const raw=rawInput.trim();
  if(!raw)return;
  STATE.scanning=true;
  renderResult("loading");

  let lookupTid = raw.toUpperCase();

// Handle JSON QR payload {"tid":"TOV-XXX", ...}
try {
  const p = JSON.parse(raw);
  if (p.tid) lookupTid = p.tid.toUpperCase();
} catch {
  // Not JSON — check if it's a URL with ?tid= param
  try {
    const url = new URL(raw);
    const tidParam = url.searchParams.get("tid");
    if (tidParam) lookupTid = tidParam.toUpperCase();
  } catch {
    // Plain ticket ID string — use as-is
  }
}

  try {
    const snap=await DB.collection("registrations").where("ticketId","==",lookupTid).limit(1).get();
    if(snap.empty){
      STATE.result={tid:lookupTid,status:"notfound"};
    } else {
      const rec={id:snap.docs[0].id,...snap.docs[0].data()};
      const idx=STATE.registrations.findIndex(r=>r.id===rec.id);
      if(idx>=0)STATE.registrations[idx]=rec; else STATE.registrations.unshift(rec);
      STATE.result={record:rec, status:rec.attended?"attended":"valid"};
    }
  } catch(e) {
    // fallback to local
    const rec=STATE.registrations.find(r=>r.ticketId?.toUpperCase()===lookupTid);
    STATE.result=rec?{record:rec,status:rec.attended?"attended":"valid"}:{tid:lookupTid,status:"notfound"};
  }

  STATE.scanning=false;
  renderResult();
  const inp=document.getElementById("scan-inp");
  if(inp){inp.value="";inp.focus();}
}

async function markAttended(id) {
  const btn=document.getElementById("mark-btn");
  if(btn){btn.disabled=true;btn.innerHTML="⏳ Marking…";}
  const stamp=nowStamp();
  try {
    await DB.collection("registrations").doc(id).update({attended:true,attendedAt:stamp});
    const idx=STATE.registrations.findIndex(r=>r.id===id);
    if(idx>=0){STATE.registrations[idx].attended=true;STATE.registrations[idx].attendedAt=stamp;}
    if(STATE.result?.record?.id===id){STATE.result.record.attended=true;STATE.result.record.attendedAt=stamp;STATE.result.status="marked";}
    STATE.lastMarked=id;
    showToast((STATE.result?.record?.name||"Attendee")+" checked in!");
    renderResult(); renderList(); renderStats();
  } catch(e){
    showToast("Failed. Check connection.","err");
    if(btn){btn.disabled=false;btn.innerHTML="✅ Mark as Attended";}
  }
}

// ══════════════════════════════════════════════════════════
//  RENDER APP
// ══════════════════════════════════════════════════════════
function renderApp() {
  const total=STATE.registrations.length;
  const attended=STATE.registrations.filter(r=>r.attended).length;
  const pending=total-attended;
  const urlTid=new URLSearchParams(window.location.search).get("tid")||"";

  root.innerHTML=`
    <div class="topbar">
      <div class="topbar-brand"><div class="live-dot"></div>The Offline Vibes</div>
      <div class="topbar-right">
        <span class="topbar-badge">🎫 Volunteer Check-In</span>
        <button class="tbtn" onclick="loadAndRender()">↻ Refresh</button>
        <button class="tbtn danger" onclick="doLogout()">Sign Out</button>
      </div>
    </div>
    <div class="main">
      <!-- LEFT -->
      <div class="left-panel">
        <div class="stats-row">
          <div class="stat-pill"><div class="stat-n sun" id="stat-total">${total}</div><div class="stat-l">Registered</div></div>
          <div class="stat-pill"><div class="stat-n grass" id="stat-att">${attended}</div><div class="stat-l">Attended</div></div>
          <div class="stat-pill"><div class="stat-n sky" id="stat-pend">${pending}</div><div class="stat-l">Pending</div></div>
        </div>

        <div>
          <div class="scan-label">Enter Ticket ID</div>
          <div class="scan-input-wrap">
            <input class="scan-input" id="scan-inp" type="text" placeholder="TOV-XXXXXXXX"
              autocomplete="off" autocorrect="off" spellcheck="false" value="${urlTid}"/>
            <button class="scan-go-btn" onclick="triggerScan()">→</button>
          </div>
          <div class="scan-hint">⌨️ Press Enter or use the camera below</div>
        </div>

        <div class="camera-section">
          <div class="camera-header">
            <span class="camera-title">📷 Camera QR Scanner</span>
            <button class="cam-toggle-btn" id="cam-btn" onclick="toggleCamera()">📷 Open Camera</button>
          </div>
          <div id="cam-idle" class="cam-idle">
            <div class="cam-idle-icon">📷</div>
            <div>Tap "Open Camera" to scan QR codes with your device camera</div>
          </div>
          <div id="qr-reader"></div>
        </div>

        <div id="result-area">
          ${urlTid
            ?`<div class="loader"><div class="spinner"></div>&nbsp;Looking up…</div>`
            :`<div class="idle-state"><div class="idle-icon">🎫</div><div class="idle-title">Ready to check in</div><div class="idle-sub">Scan a QR or enter a ticket ID above</div></div>`}
        </div>
      </div>

      <!-- RIGHT -->
      <div class="right-panel">
        <div class="list-header">
          <div class="list-title">Attendee Entries</div>
          <span class="list-count" id="list-count">${total} total</span>
        </div>
        <div class="filter-bar">
          <input class="filter-inp" id="search-inp" placeholder="🔍 Search name, ticket ID, phone…" oninput="updateSearch(this.value)"/>
          <button class="filter-pill ${STATE.filter==="all"?"active":""}" onclick="setFilter('all',event)">All</button>
          <button class="filter-pill ${STATE.filter==="attended"?"active":""}" onclick="setFilter('attended',event)">✅ Attended</button>
          <button class="filter-pill ${STATE.filter==="registered"?"active":""}" onclick="setFilter('registered',event)">⏳ Pending</button>
        </div>
        <div id="att-list">${listHTML()}</div>
      </div>
    </div>`;

  const inp=document.getElementById("scan-inp");
  if(inp){ inp.addEventListener("keydown",e=>{ if(e.key==="Enter")triggerScan(); }); inp.focus(); }
  if(urlTid) setTimeout(()=>doScan(urlTid),500);
  startLive();
}

function triggerScan(){ const v=document.getElementById("scan-inp")?.value||""; if(v.trim())doScan(v); }

// ── Result card ───────────────────────────────────────────
function renderResult(mode) {
  const area=document.getElementById("result-area");
  if(!area)return;
  if(mode==="loading"){ area.innerHTML=`<div class="loader"><div class="spinner"></div>&nbsp;Looking up…</div>`; return; }
  const {result}=STATE;
  if(!result)return;

  if(result.status==="notfound"){
    area.innerHTML=`
      <div class="result-card">
        <div class="result-status-bar err"><div class="result-icon">❌</div>
          <div><div class="result-title">Not Found</div><div class="result-sub err">Ticket does not exist</div></div>
        </div>
        <div class="result-body">
          <div class="result-row"><span class="result-k">Scanned ID</span><span class="result-v sun" style="font-family:monospace">${result.tid}</span></div>
          <div class="result-row"><span class="result-k">Action</span><span class="result-v" style="color:#F87171">Invalid ticket — check and retry</span></div>
        </div>
      </div>`;
    showToast("Ticket not found","err"); return;
  }

  const r=result.record;
  const isMarked=result.status==="marked", isAttended=result.status==="attended", isValid=result.status==="valid";
  const sc=isMarked?"ok":isAttended?"warn":"fresh";
  const icon=isMarked?"✅":isAttended?"⚠️":"🎫";
  const sub=isMarked?"Marked just now":isAttended?`Checked in: ${r.attendedAt||"—"}`:"Ready to check in";
  const price=(!r.price||r.price==="0")?'<span class="result-v grass">FREE</span>':`<span class="result-v sun">₹${r.price}</span>`;
  const gCls=(r.gender||"").toLowerCase()==="female"?"female":(r.gender||"").toLowerCase()==="male"?"male":"other";

  area.innerHTML=`
    <div class="result-card">
      <div class="result-status-bar ${sc}">
        <div class="result-icon">${icon}</div>
        <div><div class="result-title">${r.name}</div><div class="result-sub ${sc}">${sub}</div></div>
      </div>
      <div class="result-body">
        <div class="result-row"><span class="result-k">Ticket ID</span><span class="tid-display">${r.ticketId}</span></div>
        <div class="result-row"><span class="result-k">Gender</span><span class="att-gender ${gCls}">${r.gender||"—"}</span></div>
        <div class="result-row"><span class="result-k">WhatsApp</span><span class="result-v">${r.phone||"—"}</span></div>
        <div class="result-row"><span class="result-k">Event</span><span class="result-v" style="font-size:12px">${r.eventTitle||"—"}</span></div>
        <div class="result-row"><span class="result-k">Date</span><span class="result-v">${r.eventDate||"—"}</span></div>
        <div class="result-row"><span class="result-k">Venue</span><span class="result-v" style="font-size:12px">${r.eventVenue||"—"}</span></div>
        <div class="result-row"><span class="result-k">Fee</span>${price}</div>
        <div class="result-row"><span class="result-k">Registered</span><span class="result-v" style="font-size:11px;color:var(--muted)">${r.date} ${r.time}</span></div>
      </div>
      <div style="padding:0 18px 18px">
        ${isValid
          ?`<button class="mark-btn" id="mark-btn" onclick="markAttended('${r.id}')">✅ Mark as Attended</button>`
          :isAttended
          ?`<div class="done-btn">⚠️ Already checked in · ${r.attendedAt||"—"}</div>`
          :`<div class="done-btn" style="border-color:var(--grass-border);color:#66BB6A">✅ Successfully checked in</div>`}
      </div>
    </div>`;
  if(isAttended) showToast(`${r.name} already checked in`,"warn");
}

// ── List ──────────────────────────────────────────────────
function listHTML() {
  let rows=[...STATE.registrations];
  if(STATE.filter==="attended") rows=rows.filter(r=>r.attended);
  if(STATE.filter==="registered") rows=rows.filter(r=>!r.attended);
  if(STATE.search.trim()){ const q=STATE.search.toLowerCase(); rows=rows.filter(r=>(r.name||"").toLowerCase().includes(q)||(r.ticketId||"").toLowerCase().includes(q)||(r.phone||"").includes(q)||(r.email||"").toLowerCase().includes(q)); }
  if(!rows.length) return `<div class="empty-list"><div class="empty-list-icon">${STATE.filter==="attended"?"🎉":"⏳"}</div><div class="empty-list-title">${STATE.filter==="attended"?"No check-ins yet":STATE.filter==="registered"?"Everyone's checked in!":"No entries found"}</div></div>`;
  return `<div class="att-table-wrap"><table class="att-table">
    <thead><tr><th>#</th><th>Name</th><th>Ticket ID</th><th>Gender</th><th>Phone</th><th>Registered</th><th>Status</th><th>Checked In At</th><th>Contact</th></tr></thead>
    <tbody>${rows.map((r,i)=>{
      const gCls=(r.gender||"").toLowerCase()==="female"?"female":(r.gender||"").toLowerCase()==="male"?"male":"other";
      return `<tr class="${r.id===STATE.lastMarked?"new-entry":""}">
        <td class="att-num">${rows.length-i}</td>
        <td class="att-name">${r.name||"—"}</td>
        <td><span class="att-tid">${r.ticketId||"—"}</span></td>
        <td><span class="att-gender ${gCls}">${r.gender||"—"}</span></td>
        <td style="font-size:12px;color:var(--muted)">${r.phone||"—"}</td>
        <td class="att-time">${r.date||"—"}</td>
        <td><span class="att-status ${r.attended?"attended":"registered"}">${r.attended?"✅ Attended":"⏳ Pending"}</span></td>
        <td class="att-time">${r.attended?(r.attendedAt||"—"):"—"}</td>
        <td>${r.phone?`<a class="att-contact" href="https://wa.me/91${r.phone.replace(/[\s\-+]/g,"")}" target="_blank" rel="noreferrer">💬</a>`:"—"}</td>
      </tr>`;
    }).join("")}</tbody>
  </table></div>`;
}
function renderList(){ const el=document.getElementById("att-list"); if(el)el.innerHTML=listHTML(); }
function renderStats(){
  const t=STATE.registrations.length,a=STATE.registrations.filter(r=>r.attended).length,p=t-a;
  ["stat-total","stat-att","stat-pend","list-count"].forEach((id,i)=>{ const el=document.getElementById(id); if(el)el.textContent=[t,a,p,t+" total"][i]; });
}
document.querySelector(".right-panel")?.scrollTo({top:0, behavior:"smooth"});
function setFilter(f,ev){ STATE.filter=f; document.querySelectorAll(".filter-pill").forEach(el=>el.classList.remove("active")); if(ev?.target)ev.target.classList.add("active"); renderList(); }
function updateSearch(v){ STATE.search=v; renderList(); }
function doLogout(){ if(_unsub)_unsub(); stopCamera(); clearAuth(); STATE.registrations=[]; STATE.result=null; renderLogin(); }

// ── BOOT ──────────────────────────────────────────────────
if(isAuthed()){ loadAndRender(); } else { STATE.loading=false; renderLogin(); }
</script>
</body>
</html>
